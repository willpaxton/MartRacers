# Q. What is this file?
# A. This file contains options which allow you to configure your multiworld experience while allowing
#    others to play how they want as well.
#
# Q. I've never seen a file like this before. What characters am I allowed to use?
# A. This is a .yaml file. You are allowed to use most characters.
#    To test if your yaml is valid or not, you can use this website:
#        http://www.yamllint.com/
#    You can also verify that your Archipelago options are valid at this site:
#        https://archipelago.gg/check

name: Player_Name{player_name}

description: MartRacers Template

game: MartRacers
requires:
  version: 0.6.6

MartRacers:
  ################
  # Game Options #
  ################
  progression_balancing:
    # Higher = realm unlocks appear earlier in the multiworld.
    # Minimum 0, Maximum 99
    normal: 50

  accessibility:
    full: 50
    minimal: 0

  win_condition:
    # scan_target_item   - Find and scan a specific barcode (set target_barcode).
    # scan_percentage    - Scan a percentage of all available items (set scan_percentage_required).
    # unlock_all_realms  - Unlock every realm and then discover the secret Grand Register realm.
    scan_target_item: 0
    scan_percentage: 0
    unlock_all_realms: 50

  target_barcode:
    # Only used when win_condition is scan_target_item.
    '': 50

  scan_percentage_required:
    # Only used when win_condition is scan_percentage.
    # Minimum 10, Maximum 100
    75: 50

  starting_realm:
    # Which realm the player begins in. random picks one at game start.
    random: 50
    realm_of_the_baked_goods_and_brews: 0
    realm_of_the_hearth_and_garden: 0
    realm_of_the_tiny_adventurers: 0
    realm_of_the_loyal_companions: 0
    realm_of_the_wellness_wizards: 0
    realm_of_the_creative_spirits: 0
    realm_of_endless_play: 0
    realm_of_the_fashioned_ones: 0
    realm_of_the_builders: 0
    realm_of_the_sparking_circuits: 0
    realm_of_the_mighty_athletes: 0
    realm_of_the_watchful_eye: 0
    realm_of_the_wanderers: 0
    realm_of_the_forgotten_finds: 0

  items_given:
    # How many realm-unlock items are pre-collected at the start.
    # 0 = start with only your starting realm. Max is 13.
    0: 50

  ###########################
  # Item & Location Options #
  ###########################
  local_items:
    []

  non_local_items:
    []

  start_inventory:
    {}

  start_hints:
    []

  start_location_hints:
    []

  exclude_locations:
    []

  priority_locations:
    []

  item_links:
    []

  plando_items:
    []
