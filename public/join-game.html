<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MartRacer – Join Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/create-game.css">
</head>
<body>

  <div class="content">

    <!-- Header -->
    <div class="page-header">
      <a href="/" class="back-btn">&#8592; Back</a>
      <div class="logo-badge">Join Game</div>
      <h1>Mart<span>Racer</span></h1>
      <p class="tagline">Join a existing game by entering the game code.</p>
    </div>

    <!-- Class Input for you to Enter your Name!! -->
    <div class="card">
      <label class="card-label">Your Name</label>
      <input type="text" id="name" class="text-input" placeholder="Enter your name" maxlength="20" />
    </div>

    <!-- Class Input for you to Enter the Game Code!! -->
    <div class="card">
      <label class="card-label">Game Code</label>
      <input type="text" name="first" class="text-input code-input" id="first" data-next="second" placeholder="_" maxlength="1" oninput="this.value = this.value.toUpperCase();" />  
      <input type="text" name="second" class="text-input code-input" id="second" data-next="third" placeholder="_" maxlength="1" oninput="this.value = this.value.toUpperCase();" />  
      <input type="text" name="third" class="text-input code-input" id="third" data-next="fourth" placeholder="_" maxlength="1" oninput="this.value = this.value.toUpperCase();" />  
      <input type="text" name="fourth" class="text-input code-input" id="fourth" data-next="fifth" placeholder="_" maxlength="1" oninput="this.value = this.value.toUpperCase();" />  
      <input type="text" name="fifth" class="text-input code-input" id="fifth" data-next="sixth" placeholder="_" maxlength="1" oninput="this.value = this.value.toUpperCase();" />  
      <input type="text" name="sixth" class="text-input code-input" id="sixth" data-next="sixth" placeholder="_" maxlength="1" oninput="this.value = this.value.toUpperCase();" />  
    </div>

    <!-- Start Button -->
    <button class="btn btn-primary" id="joinGame">Join Game</button>


  </div>

  <footer class="footer">MartRacer &copy; 2025</footer>

  <script>
    document.getElementById("name").value = localStorage.getItem("username") || null;

    document.getElementById("joinGame").addEventListener("click", () => {
      let username = document.getElementById("name").value.trim();
      localStorage.setItem("username", username);
      let gamecode = "";
      document.querySelectorAll(".code-input").forEach(input => {
        gamecode += input.value.trim().toUpperCase();
      });
      if (gamecode.length !== 6) {
        alert("Please enter a valid 6-letter game code.");
        return;
      }
      window.location.replace("/lobby/" + gamecode);
    });

    document.querySelectorAll(".code-input").forEach(input => {
      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && e.target.value.length === 0) {
          const prevInput = document.querySelector(`.code-input[data-next="${e.target.id}"]`);
          if (prevInput) {
            prevInput.select();
          }
        }
      }), 
      input.addEventListener("input", (e) => {
        const nextInputId = e.target.getAttribute("data-next");
        if (e.target.value.length === 1 && nextInputId) {
          document.getElementById(nextInputId).focus();
        }
      }),
      input.addEventListener("paste", (e) => {
        e.preventDefault();
        const pasteData = (e.clipboardData || window.clipboardData).getData("text").toUpperCase().replace(/[^A-Z]/g, "");
        const inputs = document.querySelectorAll(".code-input");
        inputs.forEach((input, index) => {
          input.value = pasteData[index] || "";
        });
        inputs[inputs.length - 1].focus();
      });
    });


  </script>
</body>
</html>
