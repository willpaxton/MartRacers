<!DOCTYPE html>
<html>
<head>
  <title>MartRacers Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 18px;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 460px;
    }

    .phone {
      background: #111;
      border-radius: 30px;
      padding: 14px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.25);
    }

    .screen {
      background: #fff;
      border-radius: 22px;
      padding: 16px;
      min-height: 740px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.2px;
    }

    h2 {
      margin: 14px 0 10px;
      font-size: 18px;
    }

    h3 {
      margin: 14px 0 8px;
      font-size: 16px;
    }

    .muted {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }

    .card {
      border: 1px solid #e7e7e7;
      border-radius: 16px;
      padding: 12px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input {
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #ccc;
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
    }

    button {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #fafafa;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #scannerVideo {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    #itemsList {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .itemRow {
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .itemTitle {
      font-weight: 700;
    }

    .itemCat {
      color: #666;
      font-size: 13px;
      margin-top: 2px;
    }

    #status {
      margin-top: 10px;
      color: #444;
      font-size: 13px;
    }

    .itemMeta {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      width: 100%;
    }

    .itemActions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .skipBtn {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 10px;
    }

    .manualEntryRow {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
    }

    .manualEntryRow input {
      margin-top: 0;
      flex: 1;
    }

    .thumb {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1px solid #eee;
      object-fit: cover;
      flex: 0 0 auto;
      background: #fafafa;
    }

    .thumbPlaceholder {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      border: 1px solid #eee;
      background: linear-gradient(135deg, #f4f4f4, #eaeaea);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      font-size: 11px;
      text-align: center;
      padding: 6px;
      box-sizing: border-box;
      flex: 0 0 auto;
    }

    .itemText {
      min-width: 0;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
    }

    .overlay.open {
      display: flex;
    }

    .overlayCard {
      width: 100%;
      max-width: 520px;
      background: #111;
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    .overlayImg {
      width: 100%;
      border-radius: 14px;
      object-fit: contain;
      background: #000;
      max-height: 70vh;
    }

    .overlayTitle {
      color: #fff;
      font-weight: 700;
      margin-top: 10px;
      font-size: 15px;
      line-height: 1.3;
    }

    .overlaySub {
      color: #bbb;
      margin-top: 4px;
      font-size: 13px;
    }

    @media (min-width: 900px) {
      .page {
        max-width: 520px;
      }

      .screen {
        min-height: 820px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="phone">
      <div class="screen" id="appRoot"></div>
    </div>

    <div class="overlay" id="imgOverlay">
      <div class="overlayCard">
        <img id="overlayImg" class="overlayImg" alt="">
        <div class="overlayTitle" id="overlayTitle"></div>
        <div class="overlaySub" id="overlaySub"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <script>
    const socket = io();
    window.socket = socket;
    window.currentLobbyId = null;
    window.currentItems = [];

    let gameTimerInterval = null;
    let currentGameStartAt = null;

    const appRoot = document.getElementById("appRoot");

    const lobbyView = document.createElement("div");
    lobbyView.id = "lobbyView";
    lobbyView.innerHTML = `
      <div style="margin-bottom:12px;">
        <h1>MartRacers</h1>
        <div class="muted">Prototype test client</div>
      </div>

      <div class="card">
        <h2 style="margin-top:0;">Create / Join Lobby</h2>

        <div style="margin-bottom:10px;">
          <label>
            Username:
            <input id="username" value="Player_${Math.floor(Math.random() * 100)}">
          </label>
        </div>

        <div style="margin-bottom:10px;">
          <label>
            Num Items:
            <input id="numItems" type="number" value="5" min="1" max="30">
          </label>
        </div>

        <div class="row" style="margin-bottom:10px;">
          <button id="createBtn">Create Lobby</button>
        </div>

        <hr style="border:none;border-top:1px solid #eee;margin:12px 0;">

        <div style="margin-bottom:10px;">
          <label>
            Lobby Code:
            <input id="joinCode" placeholder="Enter code">
          </label>
        </div>

        <div class="row">
          <button id="joinBtn">Join Lobby</button>
        </div>

        <div id="status"></div>
      </div>
    `;

    const gameView = document.createElement("div");
    gameView.id = "gameView";
    gameView.style.display = "none";
    gameView.innerHTML = `
      <div style="margin-bottom:12px;">
        <h1>MartRacers</h1>
        <div class="muted" id="gameInfo">(game info)</div>
        <div id="gameTimer" style="margin-top:6px; font-weight:700; font-size:18px;">00:00</div>
      </div>

      <div class="card" id="scannerBox">
        <h2 style="margin-top:0;">Scanner</h2>

        <div class="row">
          <button id="startScanBtn">Start Scan</button>
          <button id="stopScanBtn" disabled>Stop</button>
        </div>

        <div id="scanStatus" class="muted" style="margin-top:8px;">
          Click Start to enable the camera.
        </div>

        <video id="scannerVideo" playsinline muted></video>

        <div id="scanResult" style="margin-top:10px; font-weight:700;">
          UPC: (none yet)
        </div>

        <div class="manualEntryRow">
          <input id="manualUpcInput" type="text" placeholder="Enter barcode manually">
          <button id="manualUpcBtn">Submit</button>
        </div>

        <div id="serverCheck" style="margin-top:8px; font-weight:700;"></div>
      </div>

      <div class="card" style="margin-top:12px;">
        <h2 style="margin-top:0;">Your Items</h2>
        <ul id="itemsList"></ul>
      </div>

      <div style="margin-top:12px;">
        <button id="backBtn">Back to Lobby</button>
      </div>
    `;

    appRoot.appendChild(lobbyView);
    appRoot.appendChild(gameView);

    const statusEl = document.getElementById("status");
    const usernameEl = document.getElementById("username");
    const numItemsEl = document.getElementById("numItems");
    const createBtn = document.getElementById("createBtn");
    const joinBtn = document.getElementById("joinBtn");
    const joinCodeEl = document.getElementById("joinCode");
    const backBtn = document.getElementById("backBtn");
    const gameInfo = document.getElementById("gameInfo");
    const gameTimerEl = document.getElementById("gameTimer");
    const serverCheckEl = document.getElementById("serverCheck");
    const manualUpcInput = document.getElementById("manualUpcInput");
    const manualUpcBtn = document.getElementById("manualUpcBtn");
    const itemsListEl = document.getElementById("itemsList");

    const overlay = document.getElementById("imgOverlay");
    const overlayImg = document.getElementById("overlayImg");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlaySub = document.getElementById("overlaySub");

    function showStatus(msg) {
      statusEl.textContent = msg;
    }
        // ---------------------------------------------------------
    // Timer helpers
    // ---------------------------------------------------------
    function formatElapsed(ms) {
      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function stopGameTimer() {
      if (gameTimerInterval) {
        clearInterval(gameTimerInterval);
        gameTimerInterval = null;
      }
    }

    function startGameTimer(gameStartAt) {
      stopGameTimer();
      currentGameStartAt = gameStartAt;

      function tick() {
        const now = Date.now();

        // Countdown phase
        if (now < gameStartAt) {
          const secondsLeft = Math.max(0, Math.ceil((gameStartAt - now) / 1000));
          gameTimerEl.textContent = `Starting in ${secondsLeft}...`;
          gameTimerEl.style.color = "#444";
          return;
        }

        // Actual live timer phase
        const elapsed = now - gameStartAt;
        gameTimerEl.textContent = formatElapsed(elapsed);
        gameTimerEl.style.color = "#111";
      }

      tick();
      gameTimerInterval = setInterval(tick, 250);
    }

    socket.onAny((event, data) => {
      console.log("EVENT:", event, data);
    });

    socket.on("connect", () => {
      showStatus("Connected to server. Socket id: " + socket.id);
    });

    socket.on("disconnect", () => {
      showStatus("Disconnected");
    });

    window.createLobby = () => createHandler();
    window.joinLobby = (code) => joinHandler(code);

    createBtn.addEventListener("click", createHandler);

    joinBtn.addEventListener("click", () => {
      const code = joinCodeEl.value && joinCodeEl.value.trim();
      joinHandler(code);
    });

    manualUpcBtn.addEventListener("click", submitManualUpc);

    manualUpcInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitManualUpc();
      }
    });

    backBtn.addEventListener("click", () => {
      history.pushState({ page: "lobby" }, "", "/");
      lobbyView.style.display = "";
      gameView.style.display = "none";

      window.currentItems = [];
      window.currentLobbyId = null;

      stopGameTimer();
      currentGameStartAt = null;
      gameTimerEl.textContent = "00:00";
      gameTimerEl.style.color = "#111";
    });

    function submitManualUpc() {
      const upc = manualUpcInput.value.trim();

      if (!upc) {
        serverCheckEl.textContent = "Enter a barcode first.";
        serverCheckEl.style.color = "crimson";
        return;
      }

      if (!window.currentLobbyId) {
        serverCheckEl.textContent = "You are not currently in a lobby.";
        serverCheckEl.style.color = "crimson";
        return;
      }

      socket.emit("game:scanUpc", {
        lobbyId: window.currentLobbyId,
        upc
      });

      serverCheckEl.textContent = "📨 Sending manual barcode to server...";
      serverCheckEl.style.color = "#444";
      manualUpcInput.value = "";
    }

    function createHandler() {
      const username = usernameEl.value.trim() || ("Player_" + Math.floor(Math.random() * 1000));
      const numItems = parseInt(numItemsEl.value, 10) || 5;

      showStatus("Creating lobby...");
      socket.emit("lobby:create", {
        playerId: Math.floor(Math.random() * 1000000),
        username,
        numItems
      });
    }

    function joinHandler(code) {
      if (!code) {
        showStatus("Enter a lobby code to join.");
        return;
      }

      const username = usernameEl.value.trim() || ("Player_" + Math.floor(Math.random() * 1000));
      showStatus("Joining lobby " + code + "...");

      socket.emit("lobby:join", {
        lobbyId: code,
        playerId: Math.floor(Math.random() * 1000000),
        username
      });
    }

    function openGameView(lobbyId) {
      window.currentLobbyId = lobbyId;
      history.pushState({ page: "game", lobbyId }, "", "/game");
      lobbyView.style.display = "none";
      gameView.style.display = "";
      gameInfo.textContent = "Lobby: " + lobbyId + " — socket: " + socket.id;
      showStatus("In lobby " + lobbyId);

      if (serverCheckEl) {
        serverCheckEl.textContent = "";
        serverCheckEl.style.color = "";
      }
    }

    socket.on("lobby:created", (data) => {
      openGameView(data.lobbyId);
    });

    socket.on("lobby:joined", (data) => {
      openGameView(data.lobbyId);
    });

    socket.on("lobby:error", (err) => {
      showStatus("Error: " + (err && err.message ? err.message : JSON.stringify(err)));
    });

    function escapeHTML(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function openImageOverlay({ src, title, category }) {
      overlayImg.src = src;
      overlayImg.alt = title || "Item image";
      overlayTitle.textContent = title || "Item";
      overlaySub.textContent = category || "";
      overlay.classList.add("open");
    }

    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) {
        overlay.classList.remove("open");
        overlayImg.src = "";
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && overlay.classList.contains("open")) {
        overlay.classList.remove("open");
        overlayImg.src = "";
      }
    });

    function renderItems(items) {
      const list = itemsListEl;
      list.innerHTML = "";

      items.forEach((it, idx) => {
        const li = document.createElement("li");
        li.className = "itemRow";

        let thumbEl;
        const imgUrl = it.image && String(it.image).trim()
          ? String(it.image).trim()
          : "";

        if (imgUrl) {
          const img = document.createElement("img");
          img.className = "thumb";
          img.loading = "lazy";
          img.decoding = "async";
          img.referrerPolicy = "no-referrer";
          img.src = imgUrl;

          img.onerror = () => {
            const ph = document.createElement("div");
            ph.className = "thumbPlaceholder";
            ph.textContent = "No image";
            img.replaceWith(ph);
          };

          img.addEventListener("click", () => {
            openImageOverlay({
              src: imgUrl,
              title: it.title,
              category: it.category
            });
          });

          thumbEl = img;
        } else {
          const ph = document.createElement("div");
          ph.className = "thumbPlaceholder";
          ph.textContent = "No image";
          thumbEl = ph;
        }

        const textBox = document.createElement("div");
        textBox.className = "itemText";
        textBox.innerHTML = `
          <div class="itemTitle">${idx + 1}. ${escapeHTML(it.title || "Untitled")}</div>
          <div class="itemCat">${escapeHTML(it.category || "")}</div>
        `;

        const actionsBox = document.createElement("div");
        actionsBox.className = "itemActions";

        const skipBtn = document.createElement("button");
        skipBtn.className = "skipBtn";
        skipBtn.textContent = "Skip";
        skipBtn.dataset.index = String(idx);

        skipBtn.addEventListener("click", () => {
          if (!window.currentLobbyId) return;

          socket.emit("game:skipItem", {
            lobbyId: window.currentLobbyId,
            itemIndex: idx
          });

          serverCheckEl.textContent = `⏭️ Requesting replacement for item ${idx + 1}...`;
          serverCheckEl.style.color = "#444";
        });

        actionsBox.appendChild(skipBtn);

        const meta = document.createElement("div");
        meta.className = "itemMeta";

        const left = document.createElement("div");
        left.className = "row";
        left.style.alignItems = "center";
        left.style.flexWrap = "nowrap";
        left.appendChild(thumbEl);
        left.appendChild(textBox);

        meta.appendChild(left);
        meta.appendChild(actionsBox);

        li.appendChild(meta);
        list.appendChild(li);
      });
    }

    socket.on("game:start", (data) => {
      openGameView(data.lobbyId);

      const items = data.yourItems || [];
      window.currentItems = items;

      renderItems(window.currentItems);

      gameInfo.textContent =
        "Lobby: " +
        data.lobbyId +
        " — " +
        (data.numItems || items.length) +
        " items";

      // Start countdown / game timer based on server-provided official start time
      if (typeof data.gameStartAt === "number") {
        startGameTimer(data.gameStartAt);
      } else {
        gameTimerEl.textContent = "00:00";
        gameTimerEl.style.color = "#111";
      }
    });

    socket.on("game:itemReplaced", (data) => {
      const { itemIndex, newItem } = data || {};

      if (
        typeof itemIndex !== "number" ||
        itemIndex < 0 ||
        !newItem ||
        !Array.isArray(window.currentItems)
      ) {
        return;
      }

      window.currentItems[itemIndex] = newItem;
      renderItems(window.currentItems);

      serverCheckEl.textContent = `✅ Item ${itemIndex + 1} replaced.`;
      serverCheckEl.style.color = "green";
    });

    socket.on("game:scanResult", (data) => {
      if (!serverCheckEl) return;

      if (data.correct) {
        serverCheckEl.textContent = `✅ Correct! Score: ${data.score} | Remaining: ${data.remaining}`;
        serverCheckEl.style.color = "green";
      } else {
        if (data.message) {
          serverCheckEl.textContent = `ℹ️ ${data.message}`;
          serverCheckEl.style.color = "#333";
        } else {
          serverCheckEl.textContent = `❌ Wrong UPC. Hit Start Scan and try again.`;
          serverCheckEl.style.color = "crimson";
        }
      }
    });

    socket.on("game:finish", (data) => {
      if (!serverCheckEl) return;

      stopGameTimer();

      const reason = data.reason || "unknown";
      serverCheckEl.textContent = `🏁 Game finished! Winner: ${data.winnerPlayerId} (reason: ${reason})`;
      serverCheckEl.style.color = "#111";
    });

    window.addEventListener("popstate", (ev) => {
      if (ev.state && ev.state.page === "game") {
        lobbyView.style.display = "none";
        gameView.style.display = "";
        window.currentLobbyId = ev.state.lobbyId || window.currentLobbyId;
      } else {
        lobbyView.style.display = "";
        gameView.style.display = "none";
        window.currentLobbyId = null;

        stopGameTimer();
        currentGameStartAt = null;
        gameTimerEl.textContent = "00:00";
        gameTimerEl.style.color = "#111";
      }
    });

    console.info("Use the form to create/join. Socket available as window.socket.");
  </script>

  <script type="module" src="/scanner.js"></script>
</body>
</html>
