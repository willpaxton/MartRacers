<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MartRacer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/quagga/dist/quagga.min.js"></script>
</head>
<body>

  
  
  <div class="content">
    <div class="logo-badge"></div>
    <h1>Mart<span>Racer</span></h1>
    <p class="tagline">Scan products. Beat the clock. Win the race.</p>

    <img src="images/Barcode.jpg" alt="Sample Barcode" class="barcode-img">

    <div class="btn-group">
      <button class="btn btn-primary" id="createGameBtn" onclick="window.location.href='create-game.html'">Create Game</button>
      <button class="btn btn-secondary" id="joinGameBtn" onclick="window.location.href='join.html'">Join Game</button>
    </div>


    <div id="scanner-container"></div>
  </div>

  <footer class="footer">MartRacer &copy; 2025</footer>

  <script src="js/main.js"></script>
  <script src="js/scanner.js"></script>
</body>
</html>
