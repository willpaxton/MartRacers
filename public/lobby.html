<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MartRacer – Lobby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/lobby.css">
  <!-- <link rel="stylesheet" href="/css/lobby.css"> -->
</head>
<body>

  <div class="content">

    <!-- Header -->
    <div class="page-header">
      <a href="/" class="back-btn">&#8592; Back</a>
      <div class="logo-badge">Lobby</div>
      <h1>Mart<span>Racer</span></h1>
      <p class="tagline">Waiting for players to join...</p>
    </div>

    <div id="lobbyId">t</div>

    <div id="players">Waiting for players...</div>

    <!-- Host-only start area -->
    <div id="hostControls" style="margin-top: 20px; display: none;">
      <button id="startGameBtn" class="btn-primary">Start Game</button>
    </div>
    
    <!-- DANIEL THIS IS FOR YOU TO DO -->
       <div id="players">
      <div class="players-head">
        <h2>Players in Lobby</h2>
        <span class="player-count-badge" id="player-count">0 / 2</span>
      </div>
 
      <ul class="players-list" id="players-list">
        
        <li class="players-empty">
          <span>🕐</span>
          Waiting for players…
        </li>
      </ul>
 
      <div class="waiting-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
 
    <!-- Start Game (This is gonna show lobby.js when the lobby is full!!) -->
    <button id="start-btn" onclick="window.location.href='/playgame.html'">
      Start Race 🏁
    </button>


 </div>

  <footer class="footer">MartRacer &copy; 2025</footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
