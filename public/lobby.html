<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MartRacers – Lobby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=content_copy" />  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/lobby.css">
  <!-- <link rel="stylesheet" href="/css/lobby.css"> -->
</head>
<body>

  <div class="content">

    <!-- Header -->
    <div class="page-header">
      <a href="/" class="back-btn">&#8592; Back</a>
      <div class="logo-badge">Lobby</div>
      <h1>Mart<span>Racers</span></h1>
      <!-- <p class="tagline">Waiting for players to join...</p> -->
    </div>
    
       <div id="players">
      <div class="players-head">
        <h2>Players in Lobby</h2>
        <span class="player-count-badge" id="player-count">0 / 2</span>
      </div>
 
      <ul class="players-list" id="players-list">
        
        <li class="players-empty">
          <span>🕐</span>
          Waiting for players…
        </li>
      </ul>
 
      <div class="waiting-dots">
        <span></span><span></span><span></span>
      </div>
    </div>


        <div id="lobbyId">
          <p class="code-value">...</p>
          <button id="copy" class="btn btn-dark" data-bs-toggle="tooltip" data-bs-placement="top" title="Copy to Clipboard"><span class="material-symbols-outlined">content_copy</span></button>
        </div>


 
        <!-- Host-only start area -->
    <div id="hostControls" style="display: none;">
      <button id="startGameBtn" class="btn-primary" style="padding: 16px 48px; border-radius: 50px; font-size: 20px;">Start Race 🏁</button>
    </div>


 </div>

  <footer class="footer">MartRacers &copy; 2025</footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/lobby.js"></script>
</body>
</html>
